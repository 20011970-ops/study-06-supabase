<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 10px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #5a67d8; }

    .stats {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 12px;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 10px;
      border-radius: 10px;
      transition: background 0.15s;
    }

    li:hover { background: #f7fafc; }

    li + li {
      border-top: 1px solid #edf2f7;
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-name {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-all;
      transition: color 0.2s;
    }

    li.checked .item-name {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 9px;
      background: none;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      color: #718096;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .clear-btn:hover {
      border-color: #e53e3e;
      color: #e53e3e;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." />
      <button onclick="addItem()">추가</button>
    </div>

    <div class="stats" id="stats"></div>

    <ul id="list"></ul>

    <div id="emptyMsg" class="empty">아이템을 추가해보세요!</div>

    <button class="clear-btn" onclick="clearChecked()">완료 항목 삭제</button>
  </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Supabase 설정
    const SUPABASE_URL = 'https://vskphnygmsxjawkhqwvp.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZza3BobnlnbXN4amF3a2hxd3ZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MzM2NDgsImV4cCI6MjA5MDQwOTY0OH0.r-SY_PfSaX1ED9_vWmvDhjKfqpAQAEmU0XVntleeNVA';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let items = [];

    const input = document.getElementById('itemInput');
    const list = document.getElementById('list');
    const stats = document.getElementById('stats');
    const emptyMsg = document.getElementById('emptyMsg');

    input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

    // 데이터 가져오기
    async function fetchItems() {
      const { data, error } = await sb
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });

      if (error) console.error('Error fetching items:', error);
      else {
        items = data;
        render();
      }
    }

    function render() {
      list.innerHTML = '';
      const total = items.length;
      const done = items.filter(i => i.checked).length;

      emptyMsg.style.display = total === 0 ? 'block' : 'none';
      stats.textContent = total > 0 ? `총 ${total}개 · 완료 ${done}개` : '';

      items.forEach((item) => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.checked;
        cb.addEventListener('change', () => toggle(item.id, !item.checked));

        const span = document.createElement('span');
        span.className = 'item-name';
        span.textContent = item.name;

        const btn = document.createElement('button');
        btn.className = 'delete-btn';
        btn.textContent = '✕';
        btn.title = '삭제';
        btn.addEventListener('click', () => remove(item.id));

        li.append(cb, span, btn);
        list.appendChild(li);
      });
    }

    async function addItem() {
      const name = input.value.trim();
      if (!name) return;
      
      const { error } = await sb
        .from('shopping_items')
        .insert([{ name, checked: false }]);
      
      if (error) alert('추가 실패: ' + error.message);
      else {
        input.value = '';
        await fetchItems();
      }

      input.focus();
    }

    async function toggle(id, checked) {
      const { error } = await sb
        .from('shopping_items')
        .update({ checked })
        .eq('id', id);
      
      if (error) alert('상태 변경 실패: ' + error.message);
      else await fetchItems();
    }

    async function remove(id) {
      const { error } = await sb
        .from('shopping_items')
        .delete()
        .eq('id', id);
      
      if (error) alert('삭제 실패: ' + error.message);
      else await fetchItems();
    }

    async function clearChecked() {
      const { error } = await sb
        .from('shopping_items')
        .delete()
        .eq('checked', true);
      
      if (error) alert('선택 항목 삭제 실패: ' + error.message);
      else await fetchItems();
    }

    // 실시간 구독 설정
    sb
      .channel('public:shopping_items')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'shopping_items' }, () => {
        fetchItems();
      })
      .subscribe();

    // 초기 로드
    fetchItems();
  </script>
</body>
</html>
